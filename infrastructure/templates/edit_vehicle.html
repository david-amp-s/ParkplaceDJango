<h1>Editar Vehículo</h1>

<form method="post">
  {% csrf_token %}

  <input type="text" name="plate" value="{{ vehicle.license_plate }}" placeholder="Placa">

  <select name="type">
    <option value="CAR" {% if vehicle.type == 'CAR' %}selected{% endif %}>Carro</option>
    <option value="MOTORCYCLE" {% if vehicle.type == 'MOTORCYCLE' %}selected{% endif %}>Moto</option>
  </select>

  <input type="number" name="client_id" value="{{ vehicle.client_id }}" placeholder="Cliente ID">

  <button type="submit">Actualizar</button>
</form>

<a href="/vehiculos/">Volver</a>
