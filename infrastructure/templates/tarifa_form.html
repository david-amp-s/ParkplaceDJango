{% extends 'base/base.html' %}

{% block title %}Nueva Tarifa{% endblock %}

{% block content %}
<h1 style="margin-bottom: 20px; color: #1e40af;">Nueva Tarifa</h1>

<form method="post" style="max-width: 400px; background: #ffffff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    {% csrf_token %}
    
    <!-- Tipo de vehículo -->
    <div style="margin-bottom: 15px;">
        <label for="{{ form.vehicle_type.id_for_label }}" style="display: block; font-weight: 600; margin-bottom: 5px;">Tipo de vehículo</label>
        {{ form.vehicle_type }}
    </div>

    <!-- Precio por hora -->
    <div style="margin-bottom: 20px;">
        <label for="{{ form.price_per_hour.id_for_label }}" style="display: block; font-weight: 600; margin-bottom: 5px;">Precio por hora</label>
        {{ form.price_per_hour }}
    </div>

    <button type="submit" style="background: #38bdf8; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s;">
        Guardar
    </button>

    <a href="{% url 'tarifas_list' %}" style="margin-left: 15px; color: #1e40af; font-weight: 500; text-decoration: underline;">Volver a tarifas</a>
</form>

{% endblock %}
