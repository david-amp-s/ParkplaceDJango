{% extends "base/base.html" %}

{% block title %}Editar Cliente - ParkPlace{% endblock %}

{% block extra_css %}
<style>
    .form-container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    .btn-update { background: #3b82f6; color: white; width: 100%; }
    .btn-cancel { color: #ef4444; text-decoration: none; font-size: 14px; margin-left: 10px; }
</style>
{% endblock %}

{% block content %}
<h1>Editar Cliente</h1>

<div class="form-container">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" name="name" value="{{ client.name }}" required>
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="phone" value="{{ client.phone }}" required>
        </div>
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" value="{{ client.email|default:'' }}">
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <button type="submit" class="btn btn-update">Actualizar Datos</button>
            <a href="/clientes/" class="btn-cancel">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
